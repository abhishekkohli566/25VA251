<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> objects in js</title>
   
</head>
<body>
    <script>
    //objects in js: collection(pair) of keys (properties) and its value
    // create an object using literals way 

    let student={
    name:"abhishek",
    age:19,
    isMarried:false,
    address:{
        vill:" kasampur khola",
        district:"muzaffarnagar",
        pincode:251315
    },
    course:"B.tech",
    branch:"cse",
    year:2025,
    getInfo:function(){
        return "My eductaion detail is" + student.branch +" " + student.year;
    },
    subjects:["maths", "hindi", "evs"," ai"],
    examDone:null
    };
    //access objects keys or property
            console.log(student.address.pincode);//object
            console.log(student.getInfo());//function
            console.log(student.subjects[2]);//array

       // console.log(typeof(student));
       //find any key in your object
       console.log('age1' in student);

       //delete any key from object 
       console.log(delete student.name);
       console.log(student);

        //find length of objects 
        let keyslength=Object.keys(student);
        console.log(keyslength.length);

        //itterate objetcs keys(properties) using for loop
    
         for(let i=0;i<keyslength.length;i++){
          console.log(student[keyslength[i]]);
        } 

         //itterate objetcs keys(properties) using for.in  loop
         for(let x in student){
            console.log(student[x]);
         }

         //create an object using new keyword
          let myInfo=new Object();
          myInfo.name="abhishek";
           myInfo.age=22;
            myInfo.city="mzn"
            myInfo.address=null;
            myInfo.mobile=9219264188;

            // access objetcs keys using[]
            console.log(myInfo['age']);            
        
          
          


</script>

</body>
</html>
