<body>
    <h2>Java script</h2>
    <script>//JavaScript variables are containers used to store data values. They are declared using the 
       // keywords var, let, or const, with let and const being the preferred methods in modern JavaScript. 
        //JavaScript is a dynamically typed language, meaning you don't need to specify the data type
         //(e.g., number, string) when declaring a variable.  
        
        //using var keyword
        var myName ="abhishek";//
        // a global object that serves as the entry point to the web page's content, known as the Document Object Model (DOM)
        document.write(myName);// op on browser
        console.log(myName);//op on console window
        </script>
        <script>
            // js exectuion and scope 
            function hello(){
                var msg=" thanks to visit !";
                //console.log(msg); // LOCAL OR BLOCK
            }
            hello();
            // variable declaration using let and const

            let myRollno=202501010165;
            console.log(myRollno);

            myRollno=202501010165; // no redeclare but can be reassigned
            console.log(myRollno);


            const myPhoneno=9219264188;
            console.log(myPhoneno);
            // myPhoneno= 232427; // no redeclared 
             console.log(myPhoneno);

        </script>

</body>
